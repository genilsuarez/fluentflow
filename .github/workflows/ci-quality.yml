name: CI Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit

      # Run all checks in parallel via background processes
      - name: Quality checks (parallel)
        run: |
          npm run lint        &  PID_LINT=$!
          npm run type-check  &  PID_TYPE=$!
          npm test            &  PID_TEST=$!
          npm run format:check & PID_FMT=$!

          FAIL=0
          wait $PID_LINT   || { echo "❌ ESLint failed";      FAIL=1; }
          wait $PID_TYPE   || { echo "❌ TypeScript failed";  FAIL=1; }
          wait $PID_TEST   || { echo "❌ Tests failed";       FAIL=1; }
          wait $PID_FMT    || { echo "❌ Format check failed"; FAIL=1; }

          [ $FAIL -eq 0 ] && echo "✅ All quality checks passed"
          exit $FAIL
